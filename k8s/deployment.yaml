apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: store-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: catalog-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_PATH
              value: /data/catalog.db
          volumeMounts:
            - name: catalog-data
              mountPath: /data
      volumes:
        - name: catalog-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: store-app
spec:
  type: NodePort
  selector:
    app: catalog-service
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30081
