repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: python-compile
        name: Compile catalog service Python files
        entry: python -m py_compile app/main.py tests/test_catalog.py
        language: system
        pass_filenames: false
        types: [python]
